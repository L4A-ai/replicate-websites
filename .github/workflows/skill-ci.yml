name: skill-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - run: npm run validate
      - run: npm run check:install
      - run: npm pack --workspace @l4a-ai/replicate-websites-skill --dry-run --json
      - run: node evals/scripts/hash-skill.mjs
