name: skill-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - name: Enable Chromium user-namespace sandbox
        run: |
          # Keep Chromium's sandbox enabled on Ubuntu runners that restrict downloaded builds.
          if [[ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
      - run: npm run validate
      - run: npm run check:install
      - run: npm pack --workspace @l4a-ai/pixel-by-pixel-skill --dry-run --json
      - run: node evals/scripts/hash-skill.mjs
